<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Personal Details Form</h1>
    <form>
    <fieldset>

     <legend><h2>Fill The Details</h2></legend>
    <label>Name</label><br> 

    <input type="text" id="name"><br><br>

     <label>Email</label><br> 
     <input type="text" id="email"><br><br>

    <label>Password</label><br>
    <input type="password" id="password"><br><br>

    <label>Gender</label><br>
    <input type="radio" name="gender" id="male" value="male">Male<br><br>
    <input type="radio" name="gender" id="female" value="female">Female<br><br>

     <label>Favourite Country</label><br>
     <input type="checkbox" id="country">Japan<br><br>
     <input type="checkbox" id="country">China<br><br>
     
    <label>Birthday</label><br>
    <input type="date"><br><br>
     <input type="submit">
    </fieldset>
    </form>
</body>
</html>
